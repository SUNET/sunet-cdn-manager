services:
  db:
    image: "platform.sunet.se/sunet-cdn/cdn-postgres-pgbr:18.3-trixie-27b6b5066137cffc5246eb676a8ef9878b5dc967"
    environment:
      - POSTGRES_PASSWORD=dev
      - POSTGRES_INITDB_ARGS=--data-checksums
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - pgbr_data:/var/lib/pgbackrest
      - ./pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    command:
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=cdn archive-push %p
  keycloak:
    image: "quay.io/keycloak/keycloak:26.0.7"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HTTPS_CERTIFICATE_FILE=/certs/keycloak.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/certs/keycloak.key
    volumes:
      - ./keycloak/generated/certs:/certs
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - db
    command: "start-dev"
  sunet-vcl-validator:
    image: "platform.sunet.se/sunet-cdn/sunet-vcl-validator:e46f64d255425ec1d87329b9a7246101b1416547"
    ports:
      - "8888:8888"
  satosa:
    image: "docker.sunet.se/satosa:8.5.1"
    environment:
      - METADATA_DIR=/etc/satosa/metadata
    ports:
      - "8000:8000"
    volumes:
      - ./satosa/generated/config:/etc/satosa
volumes:
  postgres_data:
  pgbr_data:
