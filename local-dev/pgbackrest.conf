# Based on https://dataegret.com/2025/12/pgbackrest-pitr-in-docker-a-simple-demo/
[global]
repo1-type=posix
repo1-path=/var/lib/pgbackrest/repo1
repo1-retention-full=1
repo1-bundle=y
repo1-block=y
start-fast=y
delta=y
process-max=2
log-level-console=info
log-level-file=detail
compress-type=zst

[cdn]
pg1-path=/var/lib/postgresql/18/docker
